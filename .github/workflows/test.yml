name: Test

on:
  push:
  pull_request:

jobs:
  pester:
    name: Pester on Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0.0 -MaximumVersion 5.99.99 -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run mock-FFmpeg test suite
        shell: pwsh
        run: |
          Invoke-Pester -Path .\File_Renamer.Tests.ps1 -Output Detailed
